name: Build & publish wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # déclenchement manuel pour tester

jobs:
  # -------------------------------------------------------------------------
  # Wheels platform-specific (Linux x86_64, macOS arm64, macOS x86_64)
  # -------------------------------------------------------------------------
  build_wheels:
    name: Wheels — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest    # Linux x86_64 via manylinux Docker
          - macos-latest     # macOS arm64
          - macos-13         # macOS x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.22
        # La config est dans pyproject.toml [tool.cibuildwheel]

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  # -------------------------------------------------------------------------
  # Wheel pure Python (fallback pour les utilisateurs avec un compilateur)
  # -------------------------------------------------------------------------
  build_pure_wheel:
    name: Wheel pure Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build pure wheel (sans dylibs pré-compilées)
        run: |
          pip install build hatchling
          python -m build --wheel
        # SDOT_SKIP_DYLIBS n'est pas nécessaire : si aucun .so n'est présent,
        # le hook hatchling laisse le wheel en mode pure Python automatiquement.

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-pure
          path: dist/*.whl

  # -------------------------------------------------------------------------
  # Source distribution
  # -------------------------------------------------------------------------
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build hatchling
      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # -------------------------------------------------------------------------
  # Publication sur PyPI (uniquement sur tag v*)
  # -------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [ build_wheels, build_pure_wheel, build_sdist ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/project/sdot/

    permissions:
      id-token: write   # requis pour Trusted Publishers (OIDC, sans token secret)

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
