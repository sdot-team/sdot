site_name: Sdot
site_description: Fast Semi-Discrete Optimal Transport with PyTorch/JAX interfaces

docs_dir: .

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-1
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - blog:
      blog_dir: gallery
      post_dir: posts
      post_url_format: "{slug}"
      pagination_per_page: 9
      categories_allowed: ["PyTorch", "JAX", "2D", "3D"]

hooks:
  - hooks/generate_examples.py

nav:
  - Home: index.md
  - Examples: gallery/index.md
  - API: api.md
